<!-- UserManagement.Domain/Resources/EmailTemplates/vi/VerificationCode.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #007bff; color: white; padding: 20px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { padding: 30px; background: #f9f9f9; }
        .code-box {
            font-size: 32px;
            font-weight: bold;
            color: #007bff;
            text-align: center;
            padding: 20px;
            background: white;
            border: 3px dashed #007bff;
            border-radius: 8px;
            margin: 20px 0;
            letter-spacing: 5px;
        }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #666; background: #f0f0f0; border-radius: 0 0 5px 5px; }
        .warning { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
<div class='container'>
    <div class='header'>
        <h1>🔐 Mã Xác Thực</h1>
    </div>
    <div class='content'>
        <p>Đây là mã xác thực của bạn:</p>

        <div class='code-box'>
            {{Code}}
        </div>

        <p class='warning'>⚠️ Mã này sẽ hết hạn sau {{ExpiryTime}}.</p>

        <p>Vui lòng nhập mã này để hoàn tất quá trình xác thực.</p>
        <p>Nếu bạn không yêu cầu mã này, vui lòng bỏ qua email này.</p>
    </div>
    <div class='footer'>
        <p>© 2025 FishLover System. Tất cả quyền được bảo lưu.</p>
    </div>
</div>
</body>
</html>
